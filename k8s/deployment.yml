apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-app
        image: 612915905322.dkr.ecr.ap-south-1.amazonaws.com/python-app:IMAGE_TAG
        ports:
        - containerPort: 8080
